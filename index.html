<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selbsttest Geraden</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4f8;
    color: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  p.sub { color: #6b7280; font-size: 0.9rem; margin-bottom: 2rem; }
  .btn {
    display: block;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    transition: transform 0.1s, opacity 0.2s;
    margin-bottom: 0.75rem;
  }
  .btn:hover { transform: scale(1.02); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #2563eb; color: white; }
  .btn-secondary { background: #e2e8f0; color: #475569; }
  .btn-secondary:hover { background: #cbd5e1; }
  .label { font-size: 0.8rem; color: #6b7280; margin-bottom: 0.3rem; text-align: left; }
  hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.5rem 0; }
  .footer { font-size: 0.75rem; color: #94a3b8; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Selbsttest Geraden</h1>
  <p class="sub">Lagebeziehungen von Geraden im Raum</p>

  <div class="label">Für Schüler</div>
  <a class="btn btn-primary" href="selbsttest.html">Test öffnen</a>

  <hr>

  <div class="label">Für Lehrer (passwortgeschützt)</div>
  <a class="btn btn-secondary" href="Selbsttest%20Geraden.html">Ergebnisse einsehen</a>

  <div class="footer">
    Ergebnisse werden in Firebase gespeichert.
  </div>
</div>
</body>
</html>
